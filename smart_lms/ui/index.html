<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>StudyFlow - Smart LMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; scroll-behavior: smooth; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .ai-gradient-border { position: relative; background: #ffffff; border-radius: 0.75rem; z-index: 0; }
        .ai-gradient-border::before { content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(135deg, #3525cd, #67f4b7); border-radius: 0.85rem; z-index: -1; opacity: 0.7; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d5e3fd; border-radius: 10px; }
        .glass-panel { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.85); }
        .hidden { display: none !important; }
        
        /* AI Blocks Styles */
        .block-head { font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #3525cd; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .flashcard { perspective: 1000px; height: 180px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180px); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: white; }
        .face.back { transform: rotateY(180px); background: #f0f7ff; }
        .qcard { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .opt { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 8px; cursor: pointer; transition: all 0.2s; }
        .opt:hover { background: #f8fafc; border-color: #3525cd; }
        .opt.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; }
        .opt.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .summary-block { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }
        .sec-title { font-weight: 700; margin-top: 16px; margin-bottom: 4px; color: #1e293b; }
        .sec-body { color: #475569; line-height: 1.6; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#3525cd",
                        "primary-container": "#4f46e5",
                        "secondary": "#0058be",
                        "surface": "#f8f9ff",
                        "surface-container": "#e6eeff",
                        "surface-container-low": "#eff4ff",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#777587",
                        "outline-variant": "#c7c4d8",
                        "tertiary": "#006e4b",
                        "tertiary-container": "#006e4b",
                        "on-surface": "#0d1c2f",
                        "on-surface-variant": "#464555",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6"
                    },
                    "container-max": "1280px"
                }
            }
        }
    </script>
</head>
<body class="text-on-surface overflow-hidden">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant shadow-sm h-16">
        <div class="flex justify-between items-center px-10 h-full max-w-container-max mx-auto">
            <div class="flex items-center gap-8">
                <span class="text-2xl font-bold text-primary cursor-pointer" onclick="router.navigate('home')">StudyFlow</span>
                <nav class="hidden md:flex items-center gap-6">
                    <button class="nav-link active text-primary font-bold px-3 py-2 rounded-lg" onclick="router.navigate('home')">Home</button>
                    <button class="nav-link text-on-surface-variant hover:bg-surface-container-low px-3 py-2 rounded-lg" onclick="router.navigate('courses')">Courses</button>
                    <button class="nav-link text-on-surface-variant hover:bg-surface-container-low px-3 py-2 rounded-lg" onclick="router.navigate('chat')">AI Chat</button>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <button class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-surface-container-low">notifications</button>
                <div class="w-10 h-10 rounded-full bg-primary-container overflow-hidden border-2 border-primary" id="user-profile">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuUE836M3IuvoAfgZ1GFzFpJ6eMqTLpYs6V2P7GQS2M5eAgmgsuys2L1iu36txcYjEEZD-bokQAxwsVKlhRm17Q4PI9uQ4nYeeUUIgg-DFgFgWS_8KChaTdjqr0B-0S8rZ86g9SVALtPOivWsDZ9tr_bL64_0SbligjEGdBeMyoks69d_KUvb9JZdaQMhz2NfuXqOoZltFJs0oMTyXXwjHKDaIIKmOWWDBtIQiiCrvZV1nB5uvtS8uR2Wnv437ebLzo-Bek07J4ug" class="w-full h-full object-cover"/>
                </div>
            </div>
        </div>
    </header>

    <div class="flex pt-16 h-screen">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-outline-variant bg-surface-container-lowest hidden lg:flex flex-col p-6 space-y-8">
            <div class="space-y-2">
                <p class="text-xs font-bold text-outline px-3 uppercase tracking-wider">Main Menu</p>
                <nav class="space-y-1">
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-container-low transition-all" onclick="router.navigate('home')">
                        <span class="material-symbols-outlined">home</span>
                        <span class="text-sm font-medium">Dashboard</span>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-container-low transition-all" onclick="router.navigate('courses')">
                        <span class="material-symbols-outlined">school</span>
                        <span class="text-sm font-medium">My Courses</span>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-container-low transition-all" onclick="router.navigate('chat')">
                        <span class="material-symbols-outlined">auto_awesome</span>
                        <span class="text-sm font-medium">AI Chat</span>
                    </button>
                </nav>
            </div>
            
            <div class="space-y-2">
                <p class="text-xs font-bold text-outline px-3 uppercase tracking-wider">Recent Sessions</p>
                <nav class="space-y-1" id="session-history">
                    <!-- Dynamic history -->
                </nav>
            </div>

            <div class="mt-auto bg-surface-container p-4 rounded-xl">
                <p class="text-sm font-bold text-primary mb-1">Status</p>
                <div class="flex items-center gap-2 text-xs text-on-surface-variant">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    LMS Connected
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="app-view" class="flex-1 overflow-y-auto custom-scrollbar bg-surface px-10 py-8 pb-32">
            <!-- Content injected by app.js -->
        </main>
    </div>

    <!-- Floating Chat Input (visible in chat mode or via shortcut) -->
    <div id="floating-input" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 z-50 hidden">
        <div class="bg-surface-container-lowest/80 backdrop-blur-xl border border-primary/20 shadow-lg rounded-full p-2 flex items-center gap-2">
            <div class="pl-4 text-primary">
                <span class="material-symbols-outlined">smart_toy</span>
            </div>
            <input id="main-prompt" class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2" placeholder="Ask anything..."/>
            <button id="send-btn" class="w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <!-- Templates -->
    <template id="tpl-home">
        <div class="max-w-[1100px] mx-auto space-y-8">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="text-4xl font-bold text-on-surface">Good Morning, Student</h1>
                    <p class="text-lg text-on-surface-variant">Ready to master your courses today?</p>
                </div>
                <div class="relative w-full md:w-96">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
                    <input class="w-full pl-12 pr-4 py-3 bg-white border border-outline-variant rounded-xl outline-none" placeholder="Search courses..."/>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <section class="md:col-span-8 ai-gradient-border p-6 flex flex-col justify-between min-h-[320px] shadow-lg">
                    <div class="space-y-2">
                        <span class="px-3 py-1 bg-indigo-100 text-primary text-xs font-bold rounded-full flex items-center gap-2 w-fit">
                            <span class="material-symbols-outlined text-sm">auto_awesome</span> AI Powered Study
                        </span>
                        <h2 class="text-3xl font-bold">Quick Start: AI Prep</h2>
                        <p class="text-on-surface-variant max-w-md">Generate a custom practice test or study guide based on your course materials.</p>
                    </div>
                    <div class="flex flex-wrap gap-3 mt-6">
                        <button class="bg-primary text-white px-6 py-3 rounded-lg font-bold hover:bg-primary-container transition-all" onclick="router.navigate('chat', {action: 'quiz'})">Generate Quiz</button>
                        <button class="border border-primary text-primary px-6 py-3 rounded-lg font-bold hover:bg-primary/5 transition-all" onclick="router.navigate('chat', {action: 'summary'})">Summarize Modules</button>
                    </div>
                </section>
                <section class="md:col-span-4 bg-white border border-outline-variant rounded-xl p-6 shadow-sm flex flex-col items-center justify-center">
                    <h3 class="text-sm font-bold text-outline uppercase mb-4">Study Streak</h3>
                    <div class="text-5xl font-extrabold text-primary mb-2">12</div>
                    <p class="text-sm font-medium text-on-surface-variant">Days in a row!</p>
                </section>
            </div>

            <section class="space-y-4">
                <div class="flex justify-between items-end">
                    <h2 class="text-2xl font-bold">Active Courses</h2>
                    <button class="text-primary font-bold hover:underline" onclick="router.navigate('courses')">View All</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="course-grid">
                    <!-- Dynamic courses -->
                </div>
            </section>
        </div>
    </template>

    <template id="tpl-chat">
        <div class="flex flex-col h-full max-w-4xl mx-auto pb-24">
            <div id="chat-thread" class="flex-1 space-y-6 overflow-y-auto p-4 custom-scrollbar">
                <!-- Messages -->
            </div>
            <!-- Input is floating-input outside -->
        </div>
    </template>

    <template id="tpl-course-detail">
        <div class="max-w-[1100px] mx-auto space-y-8">
            <div class="relative rounded-2xl overflow-hidden h-64 flex flex-col justify-end p-8 text-white">
                <div class="absolute inset-0 bg-primary/80 z-10"></div>
                <img id="course-hero-img" class="absolute inset-0 w-full h-full object-cover" src=""/>
                <div class="relative z-20">
                    <h1 id="course-title" class="text-4xl font-bold">Course Title</h1>
                    <p id="course-subtitle" class="text-lg opacity-90 mt-2">Course Code</p>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-4 space-y-6" id="course-summaries">
                    <h2 class="text-xl font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">auto_awesome</span> AI Summaries</h2>
                    <!-- Dynamic summaries -->
                </div>
                <div class="col-span-8 space-y-6">
                    <h2 class="text-xl font-bold">Course Materials</h2>
                    <div id="material-list" class="grid grid-cols-1 gap-4">
                        <!-- Dynamic materials -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/app.js"></script>
</body>
</html>
